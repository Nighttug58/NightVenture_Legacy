<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>NightVenture</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Start_Save_UI.css">
    <link rel="stylesheet" href="Combat_UI.css">

<body class="nv-mode-menu nv-start-mode">
    <div id="appShell">
        <header id="topCharacterBar" class="panel-base">
            <div id="personnage"></div>
        </header>

        <div id="gameLayout">
            <nav id="navigationPrincipale" class="panel-base" aria-label="Navigation principale">
                <div id="infosMondeSidebar" class="infos-monde-sidebar"></div>

                <div id="barreVuePrincipale">
                    <button id="btnExploration" onclick="ouvrirExploration()">Exploration</button>
                    <button id="btnInventaire" onclick="ouvrirInventaire()">Inventaire</button>
                    <button id="btnQuetes" onclick="ouvrirQuetes()">Quetes</button>
                    <button id="btnJournal" onclick="ouvrirJournalComplet()">Journal</button>
                    <button id="btnStatistiquesTop" class="btn-vue btn-action-personnage" onclick="ouvrirStatistiques()">
                        Statistiques
                        <span id="notifStatistiques" class="notification-bulle"></span>
                    </button>
                    <button id="btnTalentsTop" class="btn-vue btn-action-personnage" onclick="ouvrirTalents()">
                        Talents
                        <span id="notifTalents" class="notification-bulle"></span>
                    </button>
                    <button id="saveButton" class="btn-action-personnage" onclick="sauvegarderJeu()">Sauvegarder</button>
                    <label for="loadFile" class="btn-action-personnage bouton-charger-haut nv-nav-file-label">Charger</label>
                    <input type="file" id="loadFile" accept=".json" hidden onchange="chargerSauvegardeDepuisInput(event)">
                </div>

                <section id="equipementSidebar"></section>
                <section id="journalSection">
                    <div class="journal-mini-wrapper">
                        <div class="journal-mini-header">
                            <h3 id="journalMiniTitre">Journal</h3>
                        </div>
                        <div id="journalMini"></div>
                    </div>
                </section>
            </nav>

            <main id="main" class="panel">
                <div id="vuePrincipale" class="panel-base"></div>
            </main>
        </div>
    </div>

    <div id="zonesModal" class="modal">
        <div id="zonesContent" class="modal-content modal-zones">
            <div class="modal-header-zones">
                <button onclick="ouvrirRegions()">Monde</button>
                <h2>Zones</h2>
            </div>
            <div id="zonesContainer">
                <div id="listeZones"></div>
                <div id="carteMondeContainer" class="carte-container">
                    <canvas id="carteMonde" class="carte-canvas" width="1200" height="700"></canvas>
                </div>
            </div>
            <button onclick="fermerZones()">Fermer</button>
        </div>
    </div>

    <div id="regionsModal" class="modal">
        <div id="regionsContent" class="modal-content modal-zones">
            <div class="modal-header-zones">
                <button onclick="fermerRegions(); ouvrirZones();">Retour Zones</button>
                <h2>Monde</h2>
            </div>
            <div id="regionsContainer">
                <div id="listeRegions"></div>
                <div id="carteRegionsContainer" class="carte-container">
                    <canvas id="carteRegions" class="carte-canvas" width="1200" height="700"></canvas>
                </div>
            </div>
            <button onclick="fermerRegions()">Fermer</button>
        </div>
    </div>

    <div id="journalNotifications" role="status" aria-live="polite" aria-atomic="false" aria-relevant="additions removals"></div>

<script>
(function () {
    "use strict";

    function centerFastInventoryGhost(event) {
        if (window.Game?.ui?.vueActive !== "inventaire") return;
        const ghost = document.querySelector(".nvimp-drag-ghost");
        if (!ghost) return;

        if (!ghost.dataset.nvimpFastGhost) {
            const moving = document.querySelector(".nvi-layout--inventory .nvi-item.nvimp-moving");
            const icon = moving?.querySelector?.(".nvi-item__icon") || ghost.querySelector?.(".nvi-item__icon");
            ghost.dataset.nvimpFastGhost = "1";
            ghost.className = "nvimp-drag-ghost is-visible";
            if (icon) ghost.innerHTML = icon.innerHTML;
            ghost.style.transition = "none";
            ghost.style.animation = "none";
            ghost.style.filter = "none";
            ghost.style.boxShadow = "none";
            ghost.style.background = "rgba(28,24,20,.96)";
            ghost.style.border = "1px solid rgba(245,211,122,.45)";
            ghost.style.contain = "layout style paint";
            ghost.style.willChange = "transform";
            ghost.style.pointerEvents = "none";
            ghost.querySelectorAll("*").forEach(node => {
                node.style.pointerEvents = "none";
                node.style.transition = "none";
                node.style.animation = "none";
            });
        }

        ghost.style.opacity = "0.98";
        ghost.style.transform = "translate3d(" + Math.round(event.clientX) + "px," + Math.round(event.clientY) + "px,0) translate(-50%,-50%)";
    }

    document.addEventListener("pointermove", centerFastInventoryGhost, true);
})();
</script>
<script src="Exploration_Inline_HUD.js"></script>
<script src="NightVenture_Boot.js"></script>
</body>
